<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAR — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Cookie Consent + GA4 (loads GA only if accepted) -->
  <script src="cookie-consent.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif; padding: 20px;
    }
    .card {
      background: white; border-radius: 20px; padding: 40px;
      width: 100%; max-width: 440px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 {
      font-size: 48px; font-weight: 900;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo p { color: #666; margin-top: 8px; font-size: 15px; }
    .google-btn {
      width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px;
      background: white; cursor: pointer; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 20px; transition: border-color 0.2s;
    }
    .google-btn:hover { border-color: #667eea; }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #e0e0e0; }
    .divider span { color: #999; font-size: 13px; }
    input, select {
      width: 100%; padding: 13px 16px; border: 2px solid #e0e0e0;
      border-radius: 10px; font-size: 15px; margin-bottom: 12px;
      outline: none; font-family: inherit; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #667eea; }
    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-bottom: 16px; transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .toggle-text { text-align: center; color: #666; font-size: 14px; }
    .toggle-text a { color: #667eea; font-weight: 600; cursor: pointer; text-decoration: none; }
    .message { border-radius: 8px; padding: 12px; font-size: 14px; margin-bottom: 16px; }
    .message.error { background: #fff3f3; border: 1px solid #ffcdd2; color: #c62828; }
    .message.success { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }
    .signup-fields { display: none; }
    .signup-fields.visible { display: block; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <h1>⭐ STAR</h1>
    <p>SEAG Transfer Test Coach</p>
  </div>

  <button class="google-btn" onclick="loginWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><hr><span>or</span><hr></div>

  <div id="message" class="message" style="display:none"></div>

  <div class="signup-fields" id="signupFields">
    <input type="text" id="nameInput" placeholder="Your first name" />
    <select id="yearGroup">
      <option value="P6">P6 — Building foundations</option>
      <option value="P7">P7 — Exam ready</option>
    </select>
  </div>

  <input type="email" id="emailInput" placeholder="Email address" />
  <input type="password" id="passwordInput" placeholder="Password (min 6 characters)" />

  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">🔐 Log In</button>

  <p class="toggle-text">
    Don't have an account? <a onclick="toggleMode()">Sign up free</a>
  </p>

</div>

<script>
  const { createClient } = supabase
  const client = createClient(
    'https://iutcgogmxhaqgaxkznxu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1dGNnb2dteGhhcWdheGt6bnh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjE4MTQsImV4cCI6MjA4OTMzNzgxNH0.o0plRQzH8ezfttG_sEeWu3F4IUtKnyzcXtPEGJ9xRF0'
  )

  let isSignUp = false

  /* ══════════════════════════════════════
     SMART REDIRECT
     New users → onboarding.html
     Returning users → dashboard.html
  ══════════════════════════════════════ */
  async function smartRedirect(userId) {
    try {
      const { data: profile } = await client
        .from('profiles')
        .select('onboarded')
        .eq('id', userId)
        .single()

      if (profile?.onboarded === true) {
        window.location.href = 'dashboard.html'
      } else {
        window.location.href = 'onboarding.html'
      }
    } catch (err) {
      // If check fails, send to onboarding to be safe
      console.error('Redirect check error:', err.message)
      window.location.href = 'onboarding.html'
    }
  }

  /* ══════════════════════════════════════
     TOGGLE LOGIN / SIGNUP
  ══════════════════════════════════════ */
  function toggleMode() {
    isSignUp = !isSignUp
    document.getElementById('signupFields').classList.toggle('visible', isSignUp)
    document.getElementById('submitBtn').textContent = isSignUp ? '🚀 Create Account' : '🔐 Log In'
    document.querySelector('.toggle-text').innerHTML = isSignUp
      ? 'Already have an account? <a onclick="toggleMode()">Log in</a>'
      : 'Don\'t have an account? <a onclick="toggleMode()">Sign up free</a>'
    clearMessage()
  }

  /* ══════════════════════════════════════
     GOOGLE LOGIN
     Redirects back to login.html after OAuth
     so smartRedirect can run here
  ══════════════════════════════════════ */
  async function loginWithGoogle() {
    showMessage('⏳ Redirecting to Google...', 'success')
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/login.html'
      }
    })
    if (error) showMessage('⚠️ ' + error.message, 'error')
  }

  /* ══════════════════════════════════════
     EMAIL LOGIN / SIGNUP
  ══════════════════════════════════════ */
  async function handleSubmit() {
    const email    = document.getElementById('emailInput').value.trim()
    const password = document.getElementById('passwordInput').value
    const btn      = document.getElementById('submitBtn')

    if (!email || !password) {
      showMessage('⚠️ Please enter your email and password.', 'error')
      return
    }

    btn.disabled = true
    btn.textContent = '⏳ Please wait...'
    clearMessage()

    if (isSignUp) {
      const name      = document.getElementById('nameInput').value.trim()
      const yearGroup = document.getElementById('yearGroup').value

      const { error } = await client.auth.signUp({
        email, password,
        options: {
          data: { full_name: name, year_group: yearGroup },
          emailRedirectTo: window.location.origin + '/login.html'
        }
      })

      if (error) {
        showMessage('⚠️ ' + error.message, 'error')
      } else {
        showMessage('✅ Check your email to confirm your account, then come back to log in!', 'success')
      }

    } else {
      const { data, error } = await client.auth.signInWithPassword({ email, password })
      if (error) {
        showMessage('⚠️ ' + error.message, 'error')
      } else if (data?.user) {
        await smartRedirect(data.user.id)
      }
    }

    btn.disabled = false
    btn.textContent = isSignUp ? '🚀 Create Account' : '🔐 Log In'
  }

  /* ══════════════════════════════════════
     HELPERS
  ══════════════════════════════════════ */
  function showMessage(text, type) {
    const el = document.getElementById('message')
    el.textContent = text
    el.className = 'message ' + type
    el.style.display = 'block'
  }

  function clearMessage() {
    document.getElementById('message').style.display = 'none'
  }

  /* ══════════════════════════════════════
     ALREADY LOGGED IN CHECK
     Runs on page load — do smart redirect
     if user already has a session
  ══════════════════════════════════════ */
  client.auth.getSession().then(async ({ data }) => {
    if (data?.session?.user) {
      await smartRedirect(data.session.user.id)
    }
  })
</script>
<footer style="position:relative;z-index:10;width:100%;padding:24px 20px;border-top:1px solid rgba(201,168,76,.1);display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:40px;">
  <a href="mailto:staraitutor.support@gmail.com" style="font-family:'Lato',sans-serif;font-size:.74rem;color:rgba(255,255,255,.28);text-decoration:none;">Support</a>
  <a href="https://www.facebook.com/share/1DGKfvGo9b/" target="_blank" rel="noopener" style="font-family:'Lato',sans-serif;font-size:.74rem;color:rgba(255,255,255,.28);text-decoration:none;">Facebook</a>
  <a href="privacy.html" style="font-family:'Lato',sans-serif;font-size:.74rem;color:rgba(255,255,255,.28);text-decoration:none;">Privacy Policy</a>
  <a href="terms.html" style="font-family:'Lato',sans-serif;font-size:.74rem;color:rgba(255,255,255,.28);text-decoration:none;">Terms of Service</a>
</footer>
</body>
</html>
