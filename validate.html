<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR — Question Validator</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c6af7;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--muted); }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-family: var(--mono);
    font-size: 12px;
  }

  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-value { font-size: 18px; font-weight: 500; }
  .stat-label { color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.blue { color: var(--accent); }

  /* ── Setup screen ── */
  #setup-screen {
    max-width: 520px;
    margin: 80px auto;
    padding: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  #setup-screen h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  #setup-screen p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-family: var(--mono); }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  /* ── Main layout ── */
  #main { display: none; max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-bar label { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid;
  }

  .badge.english { color: var(--accent); border-color: var(--accent); background: rgba(79,142,247,0.1); }
  .badge.maths { color: var(--accent2); border-color: var(--accent2); background: rgba(124,106,247,0.1); }
  .badge.p6 { color: var(--green); border-color: var(--green); background: rgba(52,211,153,0.1); }
  .badge.p7 { color: var(--amber); border-color: var(--amber); background: rgba(251,191,36,0.1); }
  .badge.diff { color: var(--muted); border-color: var(--border); }
  .badge.topic { color: var(--muted); border-color: var(--border); }

  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 20px;
    color: var(--text);
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .option {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(52,211,153,0.08);
  }

  .option-key {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    min-width: 20px;
    padding-top: 1px;
  }

  .option.correct .option-key { color: var(--green); }

  .q-answer {
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    border-radius: 8px;
    color: var(--green);
    margin-bottom: 16px;
  }

  .q-explanation {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    margin-bottom: 20px;
  }

  /* ── AI verdict ── */
  .ai-verdict {
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.7;
    display: none;
  }

  .ai-verdict.pass {
    background: rgba(52,211,153,0.08);
    border: 1px solid rgba(52,211,153,0.25);
    display: block;
  }

  .ai-verdict.fail {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    display: block;
  }

  .ai-verdict.warn {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    display: block;
  }

  .verdict-header {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .ai-verdict.pass .verdict-header { color: var(--green); }
  .ai-verdict.fail .verdict-header { color: var(--red); }
  .ai-verdict.warn .verdict-header { color: var(--amber); }

  .verdict-text { color: var(--text); }

  /* ── Action buttons ── */
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-approve {
    background: var(--green);
    color: #0f1117;
  }
  .btn-approve:hover:not(:disabled) { background: #6ee7b7; }

  .btn-reject {
    background: var(--red);
    color: #0f1117;
  }
  .btn-reject:hover:not(:disabled) { background: #fca5a5; }

  .btn-check {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-check:hover:not(:disabled) { background: rgba(79,142,247,0.15); }

  .btn-skip {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-skip:hover:not(:disabled) { background: var(--surface); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
    padding: 12px;
    font-size: 15px;
    margin-top: 8px;
  }
  .btn-primary:hover:not(:disabled) { background: #6ba4f8; }

  /* ── Queue info ── */
  .queue-info {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
  }

  .empty h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(79,142,247,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Notification ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">STAR <span>/ Question Validator</span></div>
  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-value blue" id="stat-total">—</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value amber" id="stat-pending">—</span><span class="stat-label">Pending</span></div>
    <div class="stat"><span class="stat-value green" id="stat-approved">—</span><span class="stat-label">Approved</span></div>
    <div class="stat"><span class="stat-value red" id="stat-rejected">—</span><span class="stat-label">Rejected</span></div>
  </div>
</header>

<!-- Setup screen -->
<div id="setup-screen">
  <h2>Connect to Supabase</h2>
  <p>Enter your Supabase project details to start validating questions. Your anon key is fine here — this tool only reads and updates the questions table.</p>
  <div class="field">
    <label>Supabase URL</label>
    <input type="text" id="sb-url" value="https://iutcgogmxhaqgaxkznxu.supabase.co" />
  </div>
  <div class="field">
    <label>Supabase Anon Key</label>
    <input type="text" id="sb-key" placeholder="eyJ..." />
  </div>
  <div class="field">
    <label>Anthropic API Key (for AI checks)</label>
    <input type="text" id="ai-key" placeholder="sk-ant-..." />
  </div>
  <button class="btn btn-primary" onclick="connect()">Connect & Start Validating</button>
</div>

<!-- Main validator -->
<div id="main">
  <div class="filter-bar">
    <label>Filter:</label>
    <select id="filter-subject" onchange="loadQueue()">
      <option value="">All subjects</option>
      <option value="english">English</option>
      <option value="maths">Maths</option>
    </select>
    <select id="filter-year" onchange="loadQueue()">
      <option value="">All year groups</option>
      <option value="P6">P6</option>
      <option value="P7">P7</option>
    </select>
    <select id="filter-topic" onchange="loadQueue()">
      <option value="">All topics</option>
      <option value="punctuation">Punctuation</option>
      <option value="grammar">Grammar</option>
      <option value="spelling">Spelling</option>
      <option value="vocabulary">Vocabulary</option>
      <option value="comprehension_mc">Comprehension MC</option>
      <option value="comprehension_written">Comprehension Written</option>
      <option value="arithmetic">Arithmetic</option>
      <option value="fractions_decimals">Fractions & Decimals</option>
      <option value="geometry">Geometry</option>
      <option value="statistics">Statistics</option>
      <option value="algebra_sequences">Algebra & Sequences</option>
      <option value="measurement">Measurement</option>
    </select>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="queue-info">
    <span id="queue-label">Loading questions...</span>
    <span id="queue-pos"></span>
  </div>

  <div id="question-area"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let sb = null;
let anthropicKey = '';
let queue = [];
let currentIdx = 0;
let stats = { total: 0, pending: 0, approved: 0, rejected: 0 };

// ── Connect ──────────────────────────────────────────────────────────────────
async function connect() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  anthropicKey = document.getElementById('ai-key').value.trim();

  if (!url || !key) { showToast('Please enter Supabase URL and key', 'error'); return; }

  sb = supabase.createClient(url, key);

  // Test connection
  const { error } = await sb.from('questions').select('id').limit(1);
  if (error) { showToast('Connection failed: ' + error.message, 'error'); return; }

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  await refreshStats();
  await loadQueue();
}

// ── Stats ────────────────────────────────────────────────────────────────────
async function refreshStats() {
  const { count: total }    = await sb.from('questions').select('*', { count: 'exact', head: true });
  const { count: approved } = await sb.from('questions').select('*', { count: 'exact', head: true }).eq('validated', true);
  const { count: rejected } = await sb.from('questions').select('*', { count: 'exact', head: true }).eq('source', 'rejected');
  const pending = total - approved - rejected;

  stats = { total, pending, approved, rejected };
  document.getElementById('stat-total').textContent    = total    ?? 0;
  document.getElementById('stat-pending').textContent  = pending  ?? 0;
  document.getElementById('stat-approved').textContent = approved ?? 0;
  document.getElementById('stat-rejected').textContent = rejected ?? 0;

  if (total > 0) {
    const pct = Math.round((approved / total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
  }
}

// ── Load queue ───────────────────────────────────────────────────────────────
async function loadQueue() {
  const subject = document.getElementById('filter-subject').value;
  const year    = document.getElementById('filter-year').value;
  const topic   = document.getElementById('filter-topic').value;

  let q = sb.from('questions')
    .select('*')
    .eq('validated', false)
    .neq('source', 'rejected')
    .order('created_at', { ascending: true })
    .limit(50);

  if (subject) q = q.eq('subject', subject);
  if (year)    q = q.eq('year_group', year);
  if (topic)   q = q.eq('topic', topic);

  const { data, error } = await q;
  if (error) { showToast('Error loading questions', 'error'); return; }

  queue = data || [];
  currentIdx = 0;
  renderCurrent();
}

// ── Render current question ──────────────────────────────────────────────────
function renderCurrent() {
  const area = document.getElementById('question-area');

  if (queue.length === 0) {
    document.getElementById('queue-label').textContent = 'No pending questions match your filters';
    document.getElementById('queue-pos').textContent = '';
    area.innerHTML = `<div class="empty"><h3>All done! 🎉</h3><p>No unvalidated questions found.<br>Try changing your filters or run the seed script again.</p></div>`;
    return;
  }

  const q = queue[currentIdx];
  if (!q) {
    area.innerHTML = `<div class="empty"><h3>Batch complete</h3><p>You've reviewed all ${queue.length} questions in this batch.<br>Reload to get the next batch.</p></div>`;
    document.getElementById('queue-label').textContent = 'Batch complete';
    return;
  }

  document.getElementById('queue-label').textContent = `${queue.length - currentIdx} questions remaining in this batch`;
  document.getElementById('queue-pos').textContent = `${currentIdx + 1} / ${queue.length}`;

  const hasOptions = q.options && typeof q.options === 'object';

  let optionsHtml = '';
  if (hasOptions) {
    optionsHtml = '<div class="options-grid">';
    for (const [key, val] of Object.entries(q.options)) {
      const isCorrect = key === q.correct_answer;
      optionsHtml += `<div class="option ${isCorrect ? 'correct' : ''}">
        <span class="option-key">${key}</span>
        <span>${val}</span>
      </div>`;
    }
    optionsHtml += '</div>';
  } else {
    optionsHtml = `<div class="q-answer">✓ Answer: ${q.correct_answer}</div>`;
  }

  area.innerHTML = `
    <div class="q-card" id="current-card">
      <div class="q-meta">
        <span class="badge ${q.subject}">${q.subject}</span>
        <span class="badge ${q.year_group.toLowerCase()}">${q.year_group}</span>
        <span class="badge topic">${q.topic.replace('_', ' ')}</span>
        <span class="badge diff">difficulty ${q.difficulty}/5</span>
        <span class="badge diff">${q.question_type}</span>
      </div>

      <div class="q-text">${q.question_text}</div>

      ${optionsHtml}

      ${q.explanation ? `<div class="q-explanation">💡 ${q.explanation}</div>` : ''}

      <div class="ai-verdict" id="ai-verdict"></div>

      <div class="actions">
        <button class="btn btn-check" onclick="aiCheck()" id="btn-check">
          <span class="spinner" style="display:none" id="check-spinner"></span>
          <span id="check-label">🤖 AI Check</span>
        </button>
        <button class="btn btn-approve" onclick="approve('${q.id}')">✅ Approve</button>
        <button class="btn btn-reject" onclick="reject('${q.id}')">❌ Reject</button>
        <button class="btn btn-skip" onclick="skip()">Skip →</button>
      </div>
    </div>
  `;
}

// ── AI Check ─────────────────────────────────────────────────────────────────
async function aiCheck() {
  if (!anthropicKey) { showToast('Enter your Anthropic key on the setup screen to use AI checks', 'error'); return; }

  const q = queue[currentIdx];
  const btn = document.getElementById('btn-check');
  const spinner = document.getElementById('check-spinner');
  const label = document.getElementById('check-label');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  label.textContent = 'Checking...';

  const prompt = `You are a SEAG Transfer Test (Northern Ireland) expert reviewer checking a practice question for 10-11 year old pupils.

Review this question and give a verdict: PASS, WARN, or FAIL.

PASS = question is accurate, well-formed, appropriate difficulty, correct answer is definitely right
WARN = question has minor issues (slightly ambiguous wording, explanation could be better) but is usable  
FAIL = question has a wrong answer, serious ambiguity, inappropriate content, or wrong format for SEAG

Question details:
- Subject: ${q.subject}
- Topic: ${q.topic}
- Year group: ${q.year_group} (${q.year_group === 'P6' ? 'easier warm-up level' : 'full exam difficulty'})
- Difficulty: ${q.difficulty}/5
- Type: ${q.question_type}

Question text:
${q.question_text}

${q.options ? 'Options:\n' + Object.entries(q.options).map(([k,v]) => `${k}: ${v}`).join('\n') : ''}

Correct answer: ${q.correct_answer}

Explanation: ${q.explanation || 'none provided'}

SEAG format rules to check:
- Punctuation/spelling questions must have options A,B,C,D,N (N = no mistakes)
- Grammar questions have options A,B,C,D,E
- Maths MC questions have options A,B,C,D,E
- The correct answer must be definitively correct with no ambiguity
- For maths: verify the arithmetic is correct
- For English: verify the grammar/spelling rule is correctly applied
- Difficulty should match: P6 diff 2 = easy, P7 diff 3-4 = challenging

Respond with JSON only:
{"verdict": "PASS|WARN|FAIL", "reason": "one or two sentences explaining your verdict", "issues": ["list any specific problems"]}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json\s*/i, '').replace(/```/g, '').trim();
    const result = JSON.parse(clean);

    const verdictEl = document.getElementById('ai-verdict');
    const cls = result.verdict === 'PASS' ? 'pass' : result.verdict === 'FAIL' ? 'fail' : 'warn';
    const icon = result.verdict === 'PASS' ? '✅' : result.verdict === 'FAIL' ? '❌' : '⚠️';

    verdictEl.className = `ai-verdict ${cls}`;
    verdictEl.innerHTML = `
      <div class="verdict-header">${icon} AI Verdict: ${result.verdict}</div>
      <div class="verdict-text">${result.reason}${result.issues && result.issues.length ? '<br><br><strong>Issues:</strong> ' + result.issues.join('; ') : ''}</div>
    `;

  } catch (err) {
    showToast('AI check failed: ' + err.message, 'error');
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  label.textContent = '🤖 Re-check';
}

// ── Approve ──────────────────────────────────────────────────────────────────
async function approve(id) {
  const { error } = await sb.from('questions').update({ validated: true }).eq('id', id);
  if (error) { showToast('Error approving: ' + error.message, 'error'); return; }
  showToast('✅ Question approved', 'success');
  queue.splice(currentIdx, 1);
  await refreshStats();
  renderCurrent();
}

// ── Reject ───────────────────────────────────────────────────────────────────
async function reject(id) {
  const { error } = await sb.from('questions').update({ source: 'rejected' }).eq('id', id);
  if (error) { showToast('Error rejecting: ' + error.message, 'error'); return; }
  showToast('❌ Question rejected', 'error');
  queue.splice(currentIdx, 1);
  await refreshStats();
  renderCurrent();
}

// ── Skip ─────────────────────────────────────────────────────────────────────
function skip() {
  currentIdx++;
  if (currentIdx >= queue.length) currentIdx = 0;
  renderCurrent();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
</body>
</html>
